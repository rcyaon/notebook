title: lena's notebook
description: chips, circuits, and whatever else feels worth writing down

author: lena

style: dark
listen_for_clients_preferred_style: true

footer: "built by @rcyaon"

header_pages:
  - index.md

markdown: kramdown
kramdown:
  input: GFM
remote_theme: b2a3e8/jekyll-theme-console

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false
